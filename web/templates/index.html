<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競艇 AI x Intuition - Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .boat-card {
            transition: all 0.3s ease;
        }

        .boat-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }

        .teiban-1 {
            border-left: 6px solid #f8fafc;
        }

        .teiban-2 {
            border-left: 6px solid #3b82f6;
        }

        .teiban-3 {
            border-left: 6px solid #ef4444;
        }

        .teiban-4 {
            border-left: 6px solid #fbbf24;
        }

        .teiban-5 {
            border-left: 6px solid #f97316;
        }

        .teiban-6 {
            border-left: 6px solid #10b981;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            height: 6px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                    BOATRACE AI x INTUITION
                </h1>
                <div class="flex items-center gap-2">
                    <p class="text-sm text-gray-400">Premium Analysis & Live Prediction</p>
                    <span
                        class="px-2 py-0.5 bg-indigo-500/20 border border-indigo-500/50 text-indigo-400 text-[10px] rounded-full font-bold animate-pulse">TACTICAL
                        AI ACTIVE v2</span>
                </div>
            </div>
            <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
                <div class="flex items-center gap-2">
                    <select id="place" class="glass bg-transparent px-4 py-2 border-none">
                        <option value="01">桐生</option>
                        <option value="02">戸田</option>
                        <option value="03">江戸川</option>
                        <option value="04">平和島</option>
                        <option value="05">多摩川</option>
                        <option value="06">浜名湖</option>
                        <option value="07">蒲郡</option>
                        <option value="08">常滑</option>
                        <option value="09">津</option>
                        <option value="10">三国</option>
                        <option value="11">びわこ</option>
                        <option value="12">住之江</option>
                        <option value="13">尼崎</option>
                        <option value="14">鳴門</option>
                        <option value="15">丸亀</option>
                        <option value="16">児島</option>
                        <option value="17">宮島</option>
                        <option value="18">徳山</option>
                        <option value="19">下関</option>
                        <option value="20">若松</option>
                        <option value="21">芦屋</option>
                        <option value="22">福岡</option>
                        <option value="23">唐津</option>
                        <option value="24">大村</option>
                    </select>
                </div>

                <div id="race-tabs" class="flex flex-wrap gap-1 justify-center">
                    <!-- Buttons for 1-12R -->
                    <script>
                        document.write([...Array(12)].map((_, i) => `
                            <button onclick="setRace(${i + 1})" id="btn-race-${i + 1}" 
                                class="race-btn w-8 h-8 rounded-lg glass text-[10px] font-bold transition-all
                                ${i + 1 === 4 ? 'bg-indigo-600 text-white border-indigo-500' : 'text-gray-400 hover:bg-white/10'}">
                                ${i + 1}
                            </button>
                        `).join(''));
                    </script>
                </div>
                <input type="hidden" id="race_no" value="4">

                <div class="flex items-center gap-2">
                    <a id="live-btn" href="#" target="_blank" style="display:none;"
                        class="flex items-center space-x-2 bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-full text-sm font-semibold transition">
                        <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                        <span>Live</span>
                    </a>
                    <button onclick="fetchPrediction()"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-full font-semibold transition whitespace-nowrap">
                        予想開始
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Boat Cards -->
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span> 出走表 & 直感調整
                </h2>
                <div id="boat-list" class="space-y-4">
                    <!-- Cards will be injected here -->
                    <div class="glass p-6 flex items-center justify-center text-gray-500 italic">
                        レース情報を入力して予想ボタンを押してください
                    </div>
                </div>
            </div>

            <!-- Right: Results & Recommendations -->
            <div class="space-y-6">
                <div class="glass p-6">
                    <h2 class="text-xl font-bold mb-4">期待値上位 (3連単)</h2>
                    <div id="recommendations" class="space-y-3">
                        <!-- Recs injected here -->
                    </div>
                </div>

                <div class="glass p-6">
                    <h2 class="text-xl font-bold mb-4">展開予想イメージ</h2>
                    <div id="diagram-container"
                        class="aspect-video w-full rounded-xl bg-[#0099e5] flex items-center justify-center overflow-hidden border border-white/10 relative">
                        <svg id="race-svg" viewBox="0 0 500 300" class="w-full h-full">
                            <!-- 水面（背景） -->
                            <rect width="500" height="300" fill="#0099e5" />

                            <!-- ターンマーク（SVGで描画・完全透過） -->
                            <g id="turn-mark" transform="translate(250, 110)">
                                <!-- ブイ本体（白ベース） -->
                                <polygon points="-15,20 15,20 0,-20" fill="#ffffff" stroke="#333" stroke-width="1.5" />
                                <!-- 赤い帯（上部） -->
                                <polygon points="-6,-4 6,-4 9,4 -9,4" fill="#ef4444" stroke="#333" stroke-width="1" />
                                <!-- 赤い帯（下部） -->
                                <polygon points="-12,12 12,12 15,20 -15,20" fill="#ef4444" stroke="#333"
                                    stroke-width="1" />
                                <!-- 頭の黄色い球体 -->
                                <circle cx="0" cy="-20" r="4" fill="#facc15" stroke="#333" stroke-width="1" />
                            </g>

                            <g id="svg-boats"></g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        let intuitions = { 1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1 };
        let hitCombo = null;
        let hitPrice = null;

        function setRace(r) {
            document.getElementById('race_no').value = r;
            document.querySelectorAll('.race-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById(`btn-race-${r}`);
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            activeBtn.classList.remove('text-gray-400');
        }

        async function fetchPrediction() {
            const place = document.getElementById('place').value;
            const race = document.getElementById('race_no').value;
            const liveBtn = document.getElementById('live-btn');
            liveBtn.href = `https://www.boatrace.jp/owpc/pc/race/live?jcd=${place}`;
            liveBtn.style.display = 'flex';

            document.getElementById('boat-list').innerHTML = '<div class="glass p-10 text-center">データ解析中（最新AI搭載）...</div>';

            try {
                // キャッシュを強制回避するためタイムスタンプ付与
                const res = await fetch(`/api/predict?place=${place}&race=${race}&t=${Date.now()}`);
                currentData = await res.json();

                hitCombo = null;
                hitPrice = null;
                if (currentData.results && currentData.results.rank && currentData.results.rank.length >= 3) {
                    hitCombo = currentData.results.rank.slice(0, 3).join('-');
                    hitPrice = currentData.results.dividends["3連単"]?.price || "---";
                }

                renderUI();
                drawDiagram();
            } catch (e) {
                console.error("Fetch Error:", e);
            }
        }

        function updateIntuition(teiban, val) {
            intuitions[teiban] = parseFloat(val);
            renderRecommendations();
            drawDiagram();
        }

        function renderUI() {
            const list = document.getElementById('boat-list');
            list.innerHTML = '';

            if (currentData.error) {
                list.innerHTML = `<div class="glass p-10 text-center text-rose-400 font-bold text-lg">⚠️ 出走表データが取得できませんでした。<br><br><span class="text-sm text-gray-400">本日の開催がないか、レースが終了している可能性があります。<br>対象のレース場が本日開催しているかご確認ください。</span></div>`;
                document.getElementById('recommendations').innerHTML = '';
                const boatG = document.getElementById('svg-boats');
                if (boatG) boatG.innerHTML = '';
                return;
            }

            // 1. レース確定結果（上部に強調）
            let hitCombo = null;
            let hitPrice = null;
            if (currentData.results && currentData.results.rank && currentData.results.rank.length >= 3) {
                hitCombo = currentData.results.rank.slice(0, 3).join('-');
                hitPrice = currentData.results.dividends["3連単"]?.price || "---";

                const resDiv = document.createElement('div');
                resDiv.className = "glass p-4 bg-emerald-600/10 border-emerald-500/30 border mb-6 flex justify-between items-center";
                resDiv.innerHTML = `
                    <div>
                        <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Confirmed Result</span>
                        <div class="text-3xl font-bold text-white tracking-widest">${hitCombo}</div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-gray-400">3連単 払戻金</span>
                        <div class="text-2xl font-bold text-orange-400">¥${hitPrice}</div>
                    </div>
                `;
                list.appendChild(resDiv);
            }

            // 2. 選手リスト（凝縮UI）
            const header = document.createElement('div');
            header.className = "hidden md:grid grid-cols-12 gap-4 px-6 text-[10px] text-gray-500 uppercase font-bold mb-2";
            header.innerHTML = `
                <div class="col-span-1">艇</div>
                <div class="col-span-3">選手・成績</div>
                <div class="col-span-4 text-center">展示・オリジナルタイム・Tilt</div>
                <div class="col-span-2 text-center">AIスコア / M</div>
                <div class="col-span-2 text-center">直感補正</div>
            `;
            list.appendChild(header);

            // 平均展示タイム算出（差分用）
            const getAvg = (key) => {
                const times = currentData.players.map(p => {
                    const bi = currentData.beforeinfo[p.teiban.toString()] || currentData.beforeinfo[p.teiban] || {};
                    return parseFloat(bi[key] || 0);
                }).filter(t => t > 0);
                return times.length ? times.reduce((a, b) => a + b) / times.length : 0;
            };
            const avgST = getAvg('show_time');
            const avgLap = getAvg('lap_time');
            const avgTurn = getAvg('turn_time');
            const avgStr = getAvg('straight_time');

            currentData.players.forEach(p => {
                const bi = currentData.beforeinfo[p.teiban.toString()] || currentData.beforeinfo[p.teiban] || { show_time: 0, tilt: 0, propeller: false, lap_time: 0, turn_time: 0, straight_time: 0 };
                const ai = currentData.ai_results.find(r => r.teiban == p.teiban);
                const st = bi && bi.show_time !== undefined ? parseFloat(bi.show_time) : 0;
                const diff = st > 0 && avgST > 0 ? (st - avgST).toFixed(2) : "--";
                const diffColor = st > 0 && st < avgST ? "text-emerald-400" : (st > avgST ? "text-rose-400" : "text-gray-500");

                const lap = bi && bi.lap_time !== undefined ? parseFloat(bi.lap_time) : 0;
                const turn = bi && bi.turn_time !== undefined ? parseFloat(bi.turn_time) : 0;
                const strt = bi && bi.straight_time !== undefined ? parseFloat(bi.straight_time) : 0;

                let origTags = [];
                if (lap > 0 && avgLap > 0 && lap < avgLap - 0.1) origTags.push('<span class="text-[8px] bg-blue-500/20 text-blue-400 px-1 rounded border border-blue-500/30">総合◎</span>');
                if (turn > 0 && avgTurn > 0 && turn < avgTurn - 0.05) origTags.push('<span class="text-[8px] bg-amber-500/20 text-amber-400 px-1 rounded border border-amber-500/30">出足◎</span>');
                if (strt > 0 && avgStr > 0 && strt < avgStr - 0.03) origTags.push('<span class="text-[8px] bg-rose-500/20 text-rose-400 px-1 rounded border border-rose-500/30">伸び◎</span>');

                const score = (ai ? (ai.custom_prob || ai.ai_prob) : 0) * 100;

                const card = document.createElement('div');
                card.className = `glass boat-card p-3 teiban-${p.teiban} grid grid-cols-1 md:grid-cols-12 items-center gap-4 mb-2`;
                card.innerHTML = `
                    <div class="col-span-1 text-2xl font-black opacity-30 text-center">${p.teiban}</div>
                    <div class="col-span-3">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold text-sm">${p.name}</span>
                            ${diff < -0.04 ? '<span class="text-[8px] bg-emerald-500/20 text-emerald-400 px-1 rounded border border-emerald-500/30">一番時計</span>' : ''}
                            ${p.win_rate > 6.5 ? '<span class="text-[8px] bg-indigo-500/20 text-indigo-400 px-1 rounded border border-indigo-500/30">上位</span>' : ''}
                            ${bi.propeller ? '<span class="text-[8px] bg-orange-500/20 text-orange-400 px-1 rounded border border-orange-500/30">P交換</span>' : ''}
                            ${p.local_win_rate && p.local_win_rate >= 6.0 && (p.local_win_rate - p.win_rate) >= 1.0 ? '<span class="text-[8px] bg-cyan-500/20 text-cyan-400 px-1 rounded border border-cyan-500/30">当地巧者</span>' : ''}
                            ${bi.parts_exchange && bi.parts_exchange !== 'なし' ? `<span class="text-[8px] bg-rose-500/20 text-rose-400 px-1 rounded border border-rose-500/30">${bi.parts_exchange}</span>` : ''}
                        </div>
                        <div class="text-[10px] text-gray-500 mt-1">勝率 ${p.win_rate.toFixed(2)} / ST ${p.ST.toFixed(2)}</div>
                        <div class="flex items-center gap-1 mt-1 flex-wrap">
                            ${origTags.join('')}
                        </div>
                    </div>
                    <div class="col-span-4 text-center">
                        <div class="text-xs flex flex-row justify-center items-center gap-4">
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] text-gray-500 mb-0.5" title="展示タイム">展示</span>
                                <div class="flex items-center gap-1">
                                    <span class="font-mono text-gray-300 font-bold">${st > 0 ? st.toFixed(2) : '-.--'}</span>
                                    <span class="${diffColor} font-mono text-[10px]">(${diff > 0 ? '+' : ''}${diff !== '--' ? diff : '-'})</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-center border-l border-white/10 pl-4">
                                <span class="text-[9px] text-gray-500 mb-0.5">周 / 回 / 直</span>
                                <div class="font-mono text-gray-400 text-[10px] flex gap-1">
                                    <span>${lap > 0 ? lap.toFixed(2) : '-.--'}</span> <span class="opacity-50">/</span>
                                    <span>${turn > 0 ? turn.toFixed(2) : '-.--'}</span> <span class="opacity-50">/</span>
                                    <span>${strt > 0 ? strt.toFixed(2) : '-.--'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-[9px] text-gray-500 mt-1">
                            チルト ${bi && bi.tilt !== undefined ? parseFloat(bi.tilt).toFixed(1) : '-.-'}°
                        </div>
                    </div>

                    <div class="col-span-2 text-center">
                        <div class="text-sm font-bold text-indigo-400">${score.toFixed(1)}<span class="text-[8px] ml-0.5">pt</span></div>
                        <div class="text-[9px] text-gray-500 mt-1">モーター ${p.motor_2ren}%</div>
                    </div>
                    <div class="col-span-2 px-2 flex flex-col justify-center">
                        <input type="range" class="w-full accent-indigo-500" min="0.5" max="2.0" step="0.1" value="${intuitions[p.teiban]}" 
                               oninput="updateIntuition(${p.teiban}, this.value)">
                    </div>
                `;
                list.appendChild(card);
            });

            renderRecommendations(hitCombo, hitPrice);
        }

        function renderRecommendations(hitCombo, hitPrice) {
            const container = document.getElementById('recommendations');
            container.innerHTML = '';
            if (!currentData || !currentData.ai_results) return;

            let scores = {};
            let total = 0;
            currentData.ai_results.forEach(r => {
                const w = intuitions[r.teiban] || 1.0;
                const s = (r.custom_prob || r.ai_prob || 0.01) * w;
                scores[r.teiban] = s;
                total += s;
            });
            if (total === 0) total = 1;

            let topBets = [];
            const hasOdds = currentData.odds && Object.keys(currentData.odds).length > 0;

            if (hasOdds) {
                Object.entries(currentData.odds).forEach(([combo, odds]) => {
                    const [t1, t2, t3] = combo.split('-').map(Number);
                    const p1 = scores[t1] / total;
                    const p2 = scores[t2] / (total - scores[t1] || 1);
                    const p3 = scores[t3] / (total - scores[t1] - scores[t2] || 1);
                    const prob = p1 * p2 * p3;
                    topBets.push({ combo, prob, odds, ev: prob * odds });
                });
                topBets.sort((a, b) => b.ev - a.ev);
            } else {
                // オッズがない場合：AI軸8点
                const top6 = Object.entries(scores).sort((a, b) => b[1] - a[1]).map(e => Number(e[0]));
                const axis = top6[0], others = top6.slice(1);
                for (let j of others) {
                    for (let k of others) {
                        if (j === k) continue;
                        topBets.push({ combo: `${axis}-${j}-${k}`, ev: 0, odds: 0 });
                        if (topBets.length >= 8) break;
                    }
                    if (topBets.length >= 8) break;
                }
            }

            topBets.slice(0, 8).forEach((b, i) => {
                const isHit = b.combo === hitCombo;
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-3 rounded-lg border transition-all ${isHit ? 'bg-emerald-500/20 border-emerald-500 shadow-lg scale-[1.02]' : 'bg-white/5 border-white/10'}`;

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-lg font-black tracking-widest">${b.combo}</div>
                        ${isHit ? `<span class="px-2 py-0.5 bg-emerald-500 text-white text-[10px] rounded font-bold animate-bounce">的中！ ¥${hitPrice}</span>` : ''}
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-gray-500">${b.odds > 0 ? b.odds.toFixed(1) + '倍' : 'AI予測軸'}</div>
                        <div class="text-xs font-bold ${b.ev > 1.2 ? 'text-indigo-400' : 'text-gray-400'}">${b.ev > 0 ? 'EV ' + b.ev.toFixed(2) : '---'}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            // ── 推奨フォーメーション（4点折り返し）をUIの最後に追加 ──
            const top4 = Object.entries(scores).sort((a, b) => b[1] - a[1]).map(e => Number(e[0])).slice(0, 4);
            if (top4.length >= 4) {
                const [f1, f2, f3, f4] = top4;
                const formStr = `${f1}${f2}-${f1}${f2}=${f3}${f4}`;
                let formMark = "";
                if (hitCombo) {
                    const [r1, r2, r3] = hitCombo.split('-').map(Number);
                    if ([f1, f2].includes(r1) && [f1, f2].includes(r2) && r1 !== r2 && [f3, f4].includes(r3)) {
                        formMark = `<span class="px-2 py-0.5 bg-emerald-500 text-white text-[10px] rounded font-bold animate-bounce ml-2">的中！ ¥${hitPrice}</span>`;
                    }
                }
                const formDiv = document.createElement('div');
                formDiv.className = `flex justify-between items-center p-3 mt-4 rounded-lg border border-indigo-500/50 bg-indigo-500/10 transition-all shadow-[0_4px_10px_rgba(99,102,241,0.1)] ${formMark ? 'border-emerald-500 bg-emerald-500/10 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : ''}`;
                formDiv.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-lg font-black tracking-widest text-indigo-100">${formStr}</div>
                        ${formMark}
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-indigo-300/70 border border-indigo-500/20 px-1 py-0.5 rounded">折り返し 4点</div>
                    </div>
                `;
                container.appendChild(formDiv);
            }
        }

        function drawDiagram() {
            const boatG = document.getElementById('svg-boats');
            if (!boatG || !currentData) return;
            boatG.innerHTML = '';

            // 公式と同じ艇番カラー
            const colors = ["#ffffff", "#333333", "#ef4444", "#3b82f6", "#facc15", "#22c55e"];
            const textColors = ["#000", "#fff", "#fff", "#fff", "#000", "#fff"];

            let allBoats = [1, 2, 3, 4, 5, 6].map(t => {
                const res = currentData.ai_results.find(r => r.teiban == t);
                const s = (res ? (res.custom_prob || res.ai_prob) : 0.05) * (intuitions[t] || 1.0);
                return { teiban: t, score: s };
            }).sort((a, b) => b.score - a.score);

            allBoats.forEach((s, rank) => {
                const t = s.teiban;
                const radius = 60 + (rank * 25);
                const angle = -40 + (rank * 15);
                const rad = angle * Math.PI / 180;
                const baseX = 230 + Math.cos(rad) * radius;
                const baseY = 130 + Math.sin(rad) * radius;

                // 競艇は第1ターンマークを「左回り（反時計回り）」で旋回します。
                // 画面座標系（Y軸が下向き正）において、反時計回りの接線方向（進行方向）の角度は angle - 90 になります。
                // （※これまでは angle + 90 としてしまったため逆向きになっていました）
                const boatRotate = angle - 90;

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("transform", `translate(${baseX}, ${baseY}) rotate(${boatRotate})`);

                // トップダウンから見たボートの形状（右側・0度方向が船首・前）
                // 先端が丸みを帯び、後方が平らなボートらしいしずく寄りの形
                const boatPath = "M -18,-7 L 5,-7 Q 22,-7 22,0 Q 22,7 5,7 L -18,7 Z";

                // 文字タグなどは描画せず、SVGパスでボート本体と後部のモーター（黒い四角）を描画
                g.innerHTML = `
                    <rect x="-23" y="-3" width="7" height="6" fill="#444" rx="2" style="filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));" />
                    <path d="${boatPath}" fill="${colors[t - 1]}" stroke="#222" stroke-width="1.5" style="filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.4));" />
                `;
                boatG.appendChild(g);
            });
        }
    </script>
</body>
