<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競艇 AI x Intuition - Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .boat-card {
            transition: all 0.3s ease;
        }

        .boat-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }

        .teiban-1 {
            border-left: 6px solid #f8fafc;
        }

        .teiban-2 {
            border-left: 6px solid #3b82f6;
        }

        .teiban-3 {
            border-left: 6px solid #ef4444;
        }

        .teiban-4 {
            border-left: 6px solid #fbbf24;
        }

        .teiban-5 {
            border-left: 6px solid #f97316;
        }

        .teiban-6 {
            border-left: 6px solid #10b981;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            height: 6px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                    BOATRACE AI x INTUITION
                </h1>
                <div class="flex items-center gap-2">
                    <p class="text-sm text-gray-400">Premium Analysis & Live Prediction</p>
                    <span
                        class="px-2 py-0.5 bg-indigo-500/20 border border-indigo-500/50 text-indigo-400 text-[10px] rounded-full font-bold animate-pulse">TACTICAL
                        AI ACTIVE v2</span>
                </div>
            </div>
            <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
                <div class="flex items-center gap-2">
                    <select id="place" class="glass bg-transparent px-4 py-2 border-none">
                        <option value="01">桐生</option>
                        <option value="02">戸田</option>
                        <option value="03">江戸川</option>
                        <option value="04">平和島</option>
                        <option value="05">多摩川</option>
                        <option value="06">浜名湖</option>
                        <option value="07">蒲郡</option>
                        <option value="08">常滑</option>
                        <option value="09">津</option>
                        <option value="10">三国</option>
                        <option value="11">びわこ</option>
                        <option value="12">住之江</option>
                        <option value="13">尼崎</option>
                        <option value="14">鳴門</option>
                        <option value="15">丸亀</option>
                        <option value="16">児島</option>
                        <option value="17">宮島</option>
                        <option value="18">徳山</option>
                        <option value="19">下関</option>
                        <option value="20">若松</option>
                        <option value="21">芦屋</option>
                        <option value="22">福岡</option>
                        <option value="23">唐津</option>
                        <option value="24">大村</option>
                    </select>
                </div>

                <div id="race-tabs" class="flex flex-wrap gap-1 justify-center">
                    <!-- Buttons for 1-12R -->
                    <script>
                        document.write([...Array(12)].map((_, i) => `
                            <button onclick="setRace(${i + 1})" id="btn-race-${i + 1}" 
                                class="race-btn w-8 h-8 rounded-lg glass text-[10px] font-bold transition-all
                                ${i + 1 === 4 ? 'bg-indigo-600 text-white border-indigo-500' : 'text-gray-400 hover:bg-white/10'}">
                                ${i + 1}
                            </button>
                        `).join(''));
                    </script>
                </div>
                <input type="hidden" id="race_no" value="4">

                <div class="flex items-center gap-2">
                    <a id="live-btn" href="#" target="_blank" style="display:none;"
                        class="flex items-center space-x-2 bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-full text-sm font-semibold transition">
                        <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                        <span>Live</span>
                    </a>
                    <button onclick="fetchPrediction()"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-full font-semibold transition whitespace-nowrap">
                        予想開始
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Boat Cards -->
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span> 出走表 & 直感調整
                </h2>
                <div id="boat-list" class="space-y-4">
                    <!-- Cards will be injected here -->
                    <div class="glass p-6 flex items-center justify-center text-gray-500 italic">
                        レース情報を入力して予想ボタンを押してください
                    </div>
                </div>
            </div>

            <!-- Right: Results & Recommendations -->
            <div class="space-y-6">
                <div class="glass p-6">
                    <h2 class="text-xl font-bold mb-4">期待値上位 (3連単)</h2>
                    <div id="recommendations" class="space-y-3">
                        <!-- Recs injected here -->
                    </div>
                </div>

                <div class="glass p-6">
                    <h2 class="text-xl font-bold mb-4">展開予想イメージ</h2>
                    <div id="diagram-container"
                        class="aspect-video w-full rounded-xl bg-[#0099e5] flex items-center justify-center overflow-hidden border border-white/10 relative">
                        <svg id="race-svg" viewBox="0 0 500 300" class="w-full h-full">
                            <!-- 水面（背景） -->
                            <rect width="500" height="300" fill="#0099e5" />

                            <!-- ターンマーク（▲ 赤い三角形） -->
                            <polygon points="235,130 255,170 215,170" fill="#ef4444" stroke="#fff" stroke-width="2" />

                            <g id="svg-boats"></g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        let intuitions = { 1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1 };

        function setRace(r) {
            document.getElementById('race_no').value = r;
            // Update UI
            document.querySelectorAll('.race-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById(`btn-race-${r}`);
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            activeBtn.classList.remove('text-gray-400');

            // Auto fetch? Maybe, but let's just highlight for now. 
            // The user might want to change place too.
        }

        function getBoatCastUrl(placeCode) {
            // boatrace.jpの公式ライブ遷移URLを使用することで、確実に視聴ページへ飛ばす
            return `https://www.boatrace.jp/owpc/pc/race/live?jcd=${placeCode}`;
        }

        async function fetchPrediction() {
            const place = document.getElementById('place').value;
            const race = document.getElementById('race_no').value;

            const liveBtn = document.getElementById('live-btn');
            liveBtn.href = getBoatCastUrl(place);
            liveBtn.style.display = 'flex';

            document.getElementById('boat-list').innerHTML = '<div class="glass p-10 text-center">データ取得中...</div>';

            try {
                const res = await fetch(`/api/predict?place=${place}&race=${race}`);
                currentData = await res.json();
                console.log("[DEBUG] API Response Received:", currentData);
                if (currentData.odds) {
                    console.log(`[DEBUG] Odds found: ${Object.keys(currentData.odds).length} combinations.`);
                } else {
                    console.warn("[DEBUG] No odds property in response.");
                }
                renderUI();
                drawDiagram();
            } catch (e) {
                console.error("[DEBUG] Fetch Error:", e);
            }
        }

        function updateIntuition(teiban, val) {
            intuitions[teiban] = parseFloat(val);
            renderRecommendations();
            drawDiagram();
        }

        function renderUI() {
            const list = document.getElementById('boat-list');
            list.innerHTML = '';

            // レース結果表示エリアの追加
            if (currentData.results && currentData.results.rank && currentData.results.rank.length > 0) {
                const resDiv = document.createElement('div');
                resDiv.className = "glass p-4 bg-emerald-600/10 border-emerald-500/30 border mb-6 anim-fade-in";
                const rankText = currentData.results.rank.slice(0, 3).join(' - ');
                const div3t = currentData.results.dividends["3連単"] || { combo: "---", price: "---" };

                resDiv.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Race Result</span>
                            <div class="text-2xl font-bold text-white">${rankText}</div>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-gray-400">3連単 配当</span>
                            <div class="text-xl font-bold text-orange-400">¥${div3t.price}</div>
                        </div>
                    </div>
                `;
                list.appendChild(resDiv);
            }

            currentData.players.forEach(p => {
                const bi = currentData.beforeinfo[p.teiban.toString()] || currentData.beforeinfo[p.teiban] || { show_time: 0, tilt: 0 };
                const ai = currentData.ai_results.find(r => r.teiban == p.teiban);

                const card = document.createElement('div');
                card.className = `glass boat-card p-4 teiban-${p.teiban} flex flex-col md:flex-row items-center gap-6`;
                card.innerHTML = `
                    <div class="flex items-center gap-4 w-full md:w-1/3">
                        <div class="text-4xl font-bold opacity-20 w-8">${p.teiban}</div>
                        <div>
                            <div class="font-bold text-lg">${p.name}</div>
                            <div class="text-xs text-gray-400">勝率:${p.win_rate.toFixed(2)} / ST:${p.ST.toFixed(2)}</div>
                            <div class="text-[10px] text-indigo-400 font-bold mt-1">${ai && ai.reasoning ? ai.reasoning : ""}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center text-xs w-full md:w-1/3">
                        <div class="glass p-2 bg-white/5 rounded-lg">展示 ${parseFloat(bi.show_time || 0).toFixed(2)}s</div>
                        <div class="glass p-2 bg-white/5 rounded-lg">Tilt ${parseFloat(bi.tilt || 0).toFixed(1)}</div>
                        <div class="glass p-2 bg-white/5 rounded-lg">AI ${((ai ? (ai.custom_prob || ai.ai_prob) : 0) * 100).toFixed(1)}pt</div>
                        <div class="glass p-2 bg-white/5 rounded-lg">M ${p.motor_2ren}%</div>
                    </div>
                    <div class="w-full md:w-1/3">
                        <div class="flex justify-between text-[10px] text-gray-400 mb-1">
                            <span>不安</span>
                            <span>直感補正</span>
                            <span>期待!</span>
                        </div>
                        <input type="range" class="w-full" min="0.5" max="2.0" step="0.1" value="${intuitions[p.teiban]}" 
                               oninput="updateIntuition(${p.teiban}, this.value)">
                    </div>
                `;
                list.appendChild(card);
            });

            renderRecommendations();
        }

        function drawDiagram() {
            const boatG = document.getElementById('svg-boats');
            if (!boatG || !currentData || !currentData.ai_results) return;

            boatG.innerHTML = '';

            const boatSrc = "/static/assets/boat.png";
            const colors = ["#ffffff", "#000000", "#ef4444", "#3b82f6", "#facc15", "#22c55e"];

            // 全6艇分のデータを準備（ai_resultsにない場合も想定）
            let allBoats = [1, 2, 3, 4, 5, 6].map(t => {
                const res = currentData.ai_results.find(r => r.teiban == t);
                const prob = res ? parseFloat(res.ai_prob) : 0.05; // 存在しない場合は微小値を設定
                return {
                    teiban: t,
                    score: prob * (intuitions[t] || 1.0)
                };
            }).sort((a, b) => b.score - a.score);

            console.log("Drawing boats:", allBoats);

            allBoats.forEach((s, rank) => {
                const t = s.teiban;
                // 画面内に収まるように座標を調整 (viewBox="0 0 500 300")
                const radius = 60 + (rank * 25);
                const angle = -40 + (rank * 15);

                const rad = angle * Math.PI / 180;
                const baseX = 230 + Math.cos(rad) * radius;
                const baseY = 130 + Math.sin(rad) * radius;

                const boatRotate = angle - 130;

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("transform", `translate(${baseX}, ${baseY}) rotate(${boatRotate})`);

                g.innerHTML = `
                    <circle cx="0" cy="0" r="20" fill="${colors[t - 1]}" stroke="#fff" stroke-width="2" />
                    <image x="-18" y="-18" width="36" height="36" href="${boatSrc}" />
                    <text x="0" y="5" fill="#000" font-size="14" font-weight="bold" 
                          text-anchor="middle" transform="rotate(${-boatRotate})">${t}</text>
                `;
                boatG.appendChild(g);
            });
        }

        function renderRecommendations() {
            console.log("[DEBUG] renderRecommendations call.");
            const container = document.getElementById('recommendations');
            container.innerHTML = '';

            if (!currentData || !currentData.ai_results || currentData.ai_results.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4 italic">分析データがありません</div>';
                return;
            }

            // 1. 各艇の補正後スコアを算出
            let scores = {};
            let total = 0;
            currentData.ai_results.forEach(r => {
                const weight = (intuitions[r.teiban] || 1.0);
                const baseProb = r.custom_prob || r.ai_prob || 0.01;
                const finalScore = baseProb * weight;
                scores[r.teiban] = finalScore;
                total += finalScore;
            });

            if (total === 0) total = 1;

            let topBets = [];
            const hasOdds = currentData.odds && Object.keys(currentData.odds).length > 0;

            if (hasOdds) {
                // オッズがある場合：期待値（EV）順
                console.log(`[DEBUG] Rendering with ${Object.keys(currentData.odds).length} odds.`);
                let bets = [];
                Object.entries(currentData.odds).forEach(([combo, odds]) => {
                    const parts = combo.split('-');
                    if (parts.length < 3) return;
                    const [t1, t2, t3] = parts.map(Number);

                    // 3連単の積の法則で確率を近似
                    const p1 = (scores[t1] || 0) / total;
                    const p2 = (scores[t2] || 0) / (total - (scores[t1] || 0) || 1);
                    const p3 = (scores[t3] || 0) / (total - (scores[t1] || 0) - (scores[t2] || 0) || 1);

                    const prob = p1 * p2 * p3;
                    const ev = prob * odds;
                    bets.push({ combo, prob, odds, ev });
                });
                topBets = bets.sort((a, b) => b.ev - a.ev).slice(0, 8);
            }

            // オッズがない、またはオッズ計算結果が空の場合：AIスコア順で補完
            if (topBets.length === 0) {
                console.log("[DEBUG] Rendering with AI Score Base (No Odds).");
                const sortedTeibans = Object.entries(scores)
                    .sort((a, b) => b[1] - a[1])
                    .map(e => Number(e[0]));

                if (sortedTeibans.length >= 3) {
                    const t1 = sortedTeibans[0], t2 = sortedTeibans[1], t3 = sortedTeibans[2];
                    const t4 = sortedTeibans[3] || 4, t5 = sortedTeibans[4] || 5;
                    // 代表的な組み合わせを生成
                    const patterns = [
                        `${t1}-${t2}-${t3}`, `${t1}-${t2}-${t4}`, `${t1}-${t3}-${t2}`, `${t1}-${t3}-${t4}`,
                        `${t2}-${t1}-${t3}`, `${t2}-${t1}-${t4}`, `${t1}-${t2}-${t5}`, `${t1}-${t4}-${t2}`
                    ];
                    topBets = patterns.map(c => ({ combo: c, prob: 0, odds: 0, ev: 0 }));
                }
            }

            // 3. 描画
            topBets.forEach(b => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3 rounded-lg " +
                    (b.ev > 1.2 ? "bg-indigo-500/20 border border-indigo-500/30 shadow-indigo-500/10 shadow-lg" : "bg-white/5 border border-white/5");

                const oddsText = b.odds > 0 ? `Odds ${b.odds.toFixed(1)}` : "Odds --";
                const evText = b.ev > 0 ? `EV ${b.ev.toFixed(2)}` : "AI Score Base";
                const probText = b.prob > 0 ? `${(b.prob * 100).toFixed(1)}%` : "";

                div.innerHTML = `
                    <div class="font-bold text-lg tracking-wider">${b.combo}</div>
                    <div class="text-right">
                        <div class="text-xs text-indigo-400 font-bold">${evText}</div>
                        <div class="text-[10px] text-gray-500">${oddsText} <span class="ml-1 opacity-60">${probText}</span></div>
                    </div>
                `;
                container.appendChild(div);
            });

            // [DEBUG_FOCUS_ANCHOR] ユーザー独自の買い方表示 (不安=0.5 の艇を完全に除外)
            const allSorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const filteredTeiban = allSorted
                .filter(e => (intuitions[e[0]] || 1.0) > 0.51)
                .map(e => e[0]);

            const aiFavTeiban = currentData.ai_results
                .filter(r => (intuitions[r.teiban] || 1.0) > 0.51)
                .sort((a, b) => {
                    const scoreA = a.custom_prob !== undefined ? a.custom_prob : a.ai_prob;
                    const scoreB = b.custom_prob !== undefined ? b.custom_prob : b.ai_prob;
                    console.log(`[DEBUG-FOCUS] Comparing ${a.teiban}(${scoreA}) vs ${b.teiban}(${scoreB})`);
                    return scoreB - scoreA;
                })
                .map(r => r.teiban);
            console.log("[DEBUG-FOCUS] aiFavTeiban (Type A):", aiFavTeiban);

            if (filteredTeiban.length >= 4 && aiFavTeiban.length >= 4) {
                const a1 = aiFavTeiban[0], a2 = aiFavTeiban[1], a3 = aiFavTeiban[2], a4 = aiFavTeiban[3];
                const t1 = filteredTeiban[0], t2 = filteredTeiban[1], t3 = filteredTeiban[2], t4 = filteredTeiban[3];
                const specialDiv = document.createElement('div');
                specialDiv.className = "mt-6 p-4 border-t border-white/10 space-y-4";
                specialDiv.innerHTML = `
                    <h3 class="text-sm font-bold text-indigo-400 mb-2">直感フォーカス</h3>
                    
                    <div class="space-y-2">
                        <p class="text-[10px] text-gray-400 uppercase tracking-tighter">【タイプA: 本命】AI評価重視</p>
                        <div class="text-2xl font-bold tracking-widest text-center glass py-3 bg-indigo-600/20 border border-indigo-500/30 rounded-xl">
                            ${a1}${a2}-${a1}${a2}=${a3}${a4}
                        </div>
                    </div>

                    <div class="space-y-2">
                        <p class="text-[10px] text-gray-400 uppercase tracking-tighter">【タイプB: 穴狙い】直感スコア重視</p>
                        <div class="text-2xl font-bold tracking-widest text-center glass py-3 bg-emerald-600/20 border border-emerald-500/30 rounded-xl">
                            ${t1}-${t2}${t3}${t4}-${t2}${t3}${t4}
                        </div>
                    </div>
                `;
                container.appendChild(specialDiv);
            }
        }
    </script>
</body>

</html>
